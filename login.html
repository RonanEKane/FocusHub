<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SECURITY: Force HTTPS -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Sign In - FocusHub</title>
    <link rel="stylesheet" href="style.css?v=20.4">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg-primary);
        }
        .auth-box {
            position: relative;
            width: 100%;
            max-width: 450px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-medium);
            border-radius: 8px;
            padding: 3rem 2.5rem;
        }
        .auth-logo {
            height: 100px;
            width: auto;
            margin: 0 auto 2rem;
            display: block;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: 2px solid var(--accent-primary);
            outline-offset: 0;
            border-color: var(--accent-primary);
        }
        .btn-primary {
            width: 100%;
            padding: 0.875rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: var(--accent-glow);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .auth-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .hidden {
            display: none;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--text-primary);
        }
        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .auth-switch a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-switch a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <img src="FocusHub_vertinv.svg" alt="FocusHub" class="auth-logo">
            
            <h2>Welcome Back</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <div id="loginError" class="auth-error hidden"></div>
                
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            
            <p class="auth-switch">
                Don't have an account? <a href="signup.html">Sign up</a>
            </p>
        </div>
    </div>

    <script type="module">
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        // Check if already logged in
        async function checkSession() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    window.location.replace('./app.html');
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
        }

        // Handle login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Disable button
            const submitBtn = loginForm.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            loginError.classList.add('hidden');
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                console.log('✅ Login successful');
                
                // Use replace to avoid back button issues
                window.location.replace('./app.html');
                
            } catch (error) {
                console.error('Login error:', error);
                
                // Provide helpful error messages
                let errorMsg = error.message || 'Invalid email or password';
                
                // Handle specific error types
                if (errorMsg === 'Failed to fetch' || error.name === 'TypeError') {
                    errorMsg = 'Connection error. Unable to reach authentication server. Please check your internet connection and try again.';
                } else if (errorMsg.includes('Invalid login credentials')) {
                    errorMsg = 'Invalid email or password. Please check and try again.';
                } else if (errorMsg.includes('Email not confirmed')) {
                    errorMsg = 'Please check your email and click the confirmation link before logging in.';
                } else if (errorMsg.includes('temporarily unavailable')) {
                    errorMsg = 'Service temporarily unavailable. Please try again in a few minutes.';
                }
                
                loginError.textContent = errorMsg;
                loginError.classList.remove('hidden');
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });

        // Show logout reason if present (from auto-logout)
        const logoutReason = sessionStorage.getItem('logout_reason');
        if (logoutReason) {
            const messageDiv = document.createElement('div');
            messageDiv.style.cssText = 'background: #fef3c7; border: 1px solid #f59e0b; color: #92400e; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: center; font-size: 0.9rem;';
            messageDiv.textContent = logoutReason;
            
            const form = document.getElementById('loginForm');
            form.insertBefore(messageDiv, form.firstChild);
            
            sessionStorage.removeItem('logout_reason');
        }

        // Initialize
        checkSession();
    </script>
</body>
</html>
